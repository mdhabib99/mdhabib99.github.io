        function computeScore(answers) {
            const catScores = {};
            const catCounts = {};
            CATS.forEach(c => { catScores[c] = 0; catCounts[c] = 0; });
            QUESTIONS.forEach(q => {
                const raw = answers[q.id];
                if (raw === undefined) return;
                const scored = q.reverse ? (6 - raw) : raw;
                catScores[q.cat] += scored;
                catCounts[q.cat]++;
            });
            const result = {};
            CATS.forEach(c => {
                result[c] = catCounts[c] > 0 ? Math.round((catScores[c] / (catCounts[c] * 5)) * 100) : 0;
            });
            const answeredCount = Object.keys(answers).length;
            const total = answeredCount > 0 ? Math.round(QUESTIONS.reduce((acc,q) => {
                const raw = answers[q.id]; if(raw===undefined) return acc;
                return acc + (q.reverse ? (6-raw) : raw);
            }, 0) / (answeredCount * 5) * 100) : 0;
            return { catScores: result, total, answered: answeredCount };
        }

                    <Wrap>
                        <div style={{ ...s.card, maxWidth: 720 }}>
                            <GLogo size={40}/>
                            <div style={s.introRole}>Assessment Complete</div>
                            <div style={s.introDivider}/>
                            <div style={s.overallRow}>
                                <ScoreRing pct={total} color={grade.color}/>
                                <div style={s.overallRight}>
                                    <div style={{ ...s.gradeChip, background:grade.bg, color:grade.color }}>{grade.label}</div>
                                    <div style={s.overallStat}>{answeredCount} / 75 answered</div>
                                    <div style={s.overallSub}>Your responses were evaluated across 8 competency dimensions.</div>
                                </div>
                            </div>
                            <div style={s.introDivider}/>
                            <div style={s.catGrid}>
                                {CATS.map(cat => {
                                    const sc = catScores[cat];
                                    const col = CAT_COLORS[cat];
                                    return (
                                        <div key={cat} style={s.catCard}>
                                            <div style={s.catCardHeader}>
                                                <span>{CAT_ICONS[cat]} {cat}</span>
                                                <span style={{fontWeight:700}}>{sc}%</span>
                                            </div>
                                            <div style={s.catBarWrap}>
                                                <div style={{ ...s.catBar, width:`${sc}%`, background:col }}/>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <button style={{ ...s.startBtn, marginTop:24 }} onClick={() => window.location.reload()}>Retake Assessment</button>
                        </div>
                    </Wrap>
                );
            }

            return (
                <Wrap>
                    <div style={s.testWrap}>
                        <div style={s.topBar}>
                            <GLogo size={26}/>
                            <div style={{ flex:1 }}/>
                            <div style={s.timerBox}>{fmt(timeLeft)}</div>
                        </div>
                        <div style={s.body}>
                            <div style={s.sidebar}>
                                <div style={s.sideTitle}>Navigation</div>
                                {Array.from({ length: totalPages }, (_, pi) => (
                                    <button key={pi} onClick={() => goPage(pi)} style={{
                                        ...s.pageBtn,
                                        background: page===pi ? "#1a73e8" : "#fff",
                                        color: page===pi ? "#fff" : "#3c4043",
                                        border: page===pi ? "2px solid #1a73e8" : "1px solid #dadce0"
                                    }}>
                                        Q{pi*PER_PAGE+1}–{Math.min(pi*PER_PAGE+PER_PAGE, 75)}
                                    </button>
                                ))}
                            </div>
                            <div style={s.qArea}>
                                {pageQs.map((q, qi) => (
                                    <div key={q.id} style={{ ...s.qRow, borderLeft:`3px solid ${CAT_COLORS[q.cat]}` }}>
                                        <div style={s.qLeft}>
                                            <div style={s.qNumBadge}>{page*PER_PAGE+qi+1}</div>
                                            <div style={s.qContent}>
                                                <div style={s.qText}>{q.text}</div>
                                            </div>
                                        </div>
                                        <div style={s.qOptions}>
                                            {SCALE.map(sc => (
                                                <button key={sc.value} 
                                                    onClick={() => answer(q.id, sc.value)}
                                                    style={{ ...s.optCircle, background: answers[q.id]===sc.value ? scaleColor(sc.value) : "#fff", color: answers[q.id]===sc.value ? "#fff" : "#3c4043" }}>
                                                    {sc.short}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <div style={s.navRow}>
                                    <button onClick={() => goPage(page-1)} disabled={page===0} style={s.navBtn}>Previous</button>
                                    {page < totalPages-1 ? 
                                        <button onClick={() => goPage(page+1)} style={s.navBtnPrimary}>Next</button> :
                                        <button onClick={submit} style={{ ...s.navBtnPrimary, background:"#188038" }}>Submit</button>
                                    }
                                </div>
                            </div>
                        </div>
                    </div>
                </Wrap>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
